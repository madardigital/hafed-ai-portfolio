<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1713">
  <title>التقرير المفصل | حملة حج صحي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#0d1713;color:#fffdf8;font-family:"Tajawal",Arial,sans-serif}
    .bar{min-height:76px;padding:14px clamp(16px,4vw,48px);display:flex;align-items:center;justify-content:space-between;gap:20px;border-bottom:1px solid rgba(255,255,255,.12);background:#0d1713}
    .title{display:grid;gap:2px}.title strong{font-size:20px}.title span{color:#b7c1bb;font-size:13px}
    .back{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:9px 16px;border:1px solid rgba(221,194,141,.4);border-radius:12px;color:#ddc28d;text-decoration:none;font-weight:700}
    .viewer{height:calc(100vh - 76px);background:#e9e3d8}
    iframe{width:100%;height:100%;border:0;background:#fff}
    @media(max-width:600px){.bar{align-items:flex-start;flex-direction:column}.viewer{height:calc(100vh - 124px)}.back{width:100%}}
  </style>
</head>
<body>
  <header class="bar">
    <div class="title"><strong>التقرير المفصل لحملة حج صحي</strong><span>معاينة داخل معرض الأعمال</span></div>
    <a class="back" href="./#projects">العودة إلى نماذج الأعمال</a>
  </header>
  <main class="viewer">
    <iframe src="https://drive.google.com/file/d/1yyHwdmM3EnxS9k5huSQjuEl6evaDO37x/preview" title="التقرير المفصل لحملة حج صحي" allow="autoplay"></iframe>
  </main>
</body>
</html>
