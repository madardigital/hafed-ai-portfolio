<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3eee4"/>
      <stop offset="1" stop-color="#e7dcc8"/>
    </linearGradient>
    <linearGradient id="date" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d3e24"/>
      <stop offset="1" stop-color="#a96a32"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#57351f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1440" cy="120" r="260" fill="#d5e1c5" opacity="0.7"/>
  <circle cx="160" cy="900" r="250" fill="#d8c7ad" opacity="0.55"/>
  <g filter="url(#shadow)">
    <rect x="100" y="100" width="1400" height="800" rx="38" fill="#fffdf8"/>
  </g>
  <g transform="translate(140 150)">
    <rect width="430" height="700" rx="30" fill="url(#date)"/>
    <ellipse cx="215" cy="220" rx="120" ry="145" fill="#542f1d" opacity="0.55"/>
    <ellipse cx="215" cy="220" rx="92" ry="118" fill="#8d542d"/>
    <path d="M215 112c-18 42-20 92-4 137 12 35 10 68-10 103" stroke="#d6a16d" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M110 516c70-72 147-72 214 0" stroke="#f5e9d6" stroke-width="10" fill="none" stroke-linecap="round"/>
    <foreignObject x="55" y="545" width="320" height="120"><div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="font-family:Tajawal,Arial,sans-serif;color:#fff7e9;text-align:center"><div style="font-size:25px;font-weight:800">منتج محلي</div><div style="font-size:20px;line-height:1.7;margin-top:8px">قصة ضيافة وهوية بصرية دافئة</div></div></foreignObject>
  </g>
  <foreignObject x="640" y="165" width="740" height="190">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="font-family:Tajawal,Arial,sans-serif;text-align:right;color:#5c3825">
      <div style="font-size:28px;font-weight:700;color:#2f6a40;margin-bottom:12px">فكرة إعلان وهوية لعلامة تمور سعودية</div>
      <div style="font-size:78px;line-height:1.15;font-weight:900">نخيلنا</div>
      <div style="font-size:36px;font-weight:800;color:#2f6a40;margin-top:12px">تمرة تجمعنا</div>
    </div>
  </foreignObject>
  <g transform="translate(640 410)">
    <rect width="700" height="125" rx="24" fill="#f4efe6" stroke="#dfd2bf" stroke-width="2"/>
    <foreignObject x="30" y="22" width="640" height="84"><div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="font-family:Tajawal,Arial,sans-serif;text-align:right;color:#4e3527"><div style="font-size:24px;font-weight:800;color:#2f6a40">الفكرة</div><div style="font-size:20px;line-height:1.65">تقديم التمر بوصفه جزءًا من لحظة الضيافة واللقاء، لا مجرد منتج غذائي.</div></div></foreignObject>
  </g>
  <g transform="translate(640 565)">
    <rect width="700" height="125" rx="24" fill="#f4efe6" stroke="#dfd2bf" stroke-width="2"/>
    <foreignObject x="30" y="22" width="640" height="84"><div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="font-family:Tajawal,Arial,sans-serif;text-align:right;color:#4e3527"><div style="font-size:24px;font-weight:800;color:#2f6a40">رسالة العلامة</div><div style="font-size:20px;line-height:1.65">من نخيل بلادنا تكتمل الضيافة؛ تمرة تُقدّم بفخر في كل بيت.</div></div></foreignObject>
  </g>
  <g transform="translate(640 720)">
    <rect width="700" height="125" rx="24" fill="#f4efe6" stroke="#dfd2bf" stroke-width="2"/>
    <foreignObject x="30" y="22" width="640" height="84"><div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="font-family:Tajawal,Arial,sans-serif;text-align:right;color:#4e3527"><div style="font-size:24px;font-weight:800;color:#2f6a40">الاتجاه البصري</div><div style="font-size:20px;line-height:1.65">ألوان مستوحاة من النخلة والتمر، ومشاهد دافئة تنتهي بصورة المنتج والشعار.</div></div></foreignObject>
  </g>
</svg>